name: OrangeHRM Ultimate Pipeline

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  smoke:
    name: Smoke Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run smoke
        env:
          CYPRESS_username: Admin
          CYPRESS_password: admin123

  regression:
    name: Regression Suite
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run regression
        env:
          CYPRESS_username: Admin
          CYPRESS_password: admin123

  api:
    name: API Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run api
        env:
          CYPRESS_username: Admin
          CYPRESS_password: admin123